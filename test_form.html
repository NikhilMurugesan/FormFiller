<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form for AI Autofiller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 40px; }
        form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input[type="text"], input[type="email"], input[type="number"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <form id="jobApplicationForm">
        <h2>Job Application Form</h2>

        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="name_input" placeholder="e.g. John Doe">
        </div>

        <div class="form-group">
            <label for="emailAddr">Email Address</label>
            <input type="email" id="emailAddr" name="contact_email" placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label for="experience">Years of Experience</label>
            <input type="number" id="experience" name="yoe" placeholder="5">
        </div>
        
        <div class="form-group">
            <label for="roleType">Preferred Role</label>
            <select id="roleType" name="role_preference">
                <option value="">Select a role...</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend_ai_ml">AI/ML Backend Engineering</option>
                <option value="fullstack">Fullstack Developer</option>
            </select>
        </div>

        <!-- Dynamic Dropdown Example -->
        <div class="form-group">
            <label for="relocateSelect">Are you willing to relocate?</label>
            <select id="relocateSelect" name="willing_to_relocate" onchange="toggleRelocationDetails()">
                <option value="">Select...</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <!-- This field only appears if user selects 'Yes' to relocation -->
        <div id="relocationDetailsGroup" class="form-group hidden">
            <label for="relocationDetails">Which cities are you interested in?</label>
            <input type="text" id="relocationDetails" name="relocation_city_preference" placeholder="e.g., New York, Austin">
        </div>
        
        <script>
            function toggleRelocationDetails() {
                const select = document.getElementById('relocateSelect');
                const detailsGroup = document.getElementById('relocationDetailsGroup');
                if (select.value === 'yes') {
                    detailsGroup.classList.remove('hidden');
                } else {
                    detailsGroup.classList.add('hidden');
                }
            }
        </script>

        <!-- Unmapped Field Example -->
        <div class="form-group">
            <label for="motivation">Why do you want to work here?</label>
            <textarea id="motivation" name="motivation_reason" rows="3" placeholder="I am highly motivated..."></textarea>
        </div>

        <button type="submit" onclick="event.preventDefault(); alert('Form Submitted!');">Submit Application</button>
    </form>

</body>
</html>
